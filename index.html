<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CakeHub • Your Life OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .section { display: none; }
        .section.active { display: block; }
        .nav-active { background-color: #6366f1; color: white; border-radius: 9999px; }
        .glass { background: rgba(255,255,255, 0.06); backdrop-filter: blur(20px); }
        .mit-card { background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%); border: 1px solid #334155; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Header -->
    <div class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-cake-candles text-white text-2xl"></i>
                </div>
                <div>
                    <span class="font-display text-2xl font-semibold tracking-tighter">CakeHub</span>
                    <span class="text-xs px-1.5 py-0.5 bg-zinc-800 text-zinc-400 rounded-full ml-1.5 text-[10px]">v0.4 • Money Moves</span>
                </div>
            </div>
            <div id="current-date" class="text-sm text-zinc-400 font-mono"></div>
        </div>
    </div>

    <div class="max-w-screen-xl mx-auto px-6 pt-8 pb-12">
        
        <!-- Greeting -->
        <div class="mb-8">
            <h1 class="text-5xl font-display tracking-tighter font-semibold">Good morning, Ishraf.</h1>
            <p class="text-xl text-zinc-400 mt-1">Your personal operating system.</p>
        </div>

        <!-- Navigation -->
        <div class="flex items-center gap-x-1 mb-8 bg-zinc-900 p-1 rounded-3xl w-fit border border-zinc-800">
            <button onclick="showSection('dashboard')" class="nav-item px-5 py-2 text-sm font-medium flex items-center gap-x-2 nav-active" id="nav-dashboard">
                <i class="fa-solid fa-home w-4"></i><span>Dashboard</span>
            </button>
            <button onclick="showSection('tasks')" class="nav-item px-5 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-zinc-800 rounded-3xl" id="nav-tasks">
                <i class="fa-solid fa-check-circle w-4"></i><span>Tasks</span>
            </button>
            <button onclick="showSection('reminders')" class="nav-item px-5 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-zinc-800 rounded-3xl" id="nav-reminders">
                <i class="fa-solid fa-bell w-4"></i><span>Reminders</span>
            </button>
            <button onclick="showSection('money')" class="nav-item px-5 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-zinc-800 rounded-3xl" id="nav-money">
                <i class="fa-solid fa-dollar-sign w-4"></i><span>Money</span>
            </button>
            <button onclick="showSection('spark')" class="nav-item px-5 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-zinc-800 rounded-3xl" id="nav-spark">
                <i class="fa-solid fa-lightbulb w-4"></i><span>Spark</span>
            </button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="section active">
            
            <!-- MIT SECTION -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-3 px-1">
                    <div>
                        <span class="text-xs font-medium tracking-[1.5px] text-amber-400">MOST IMPORTANT</span>
                        <h2 class="text-2xl font-semibold tracking-tighter">Today’s #1 Priority</h2>
                    </div>
                    <div id="mit-streak-badge" class="hidden items-center gap-x-1.5 px-3 py-1 bg-amber-400/10 text-amber-400 rounded-2xl text-xs font-medium">
                        <i class="fa-solid fa-fire"></i>
                        <span id="mit-streak-text">0 day streak</span>
                    </div>
                </div>
                <div id="mit-card" class="mit-card rounded-3xl p-6 border border-zinc-700"></div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div onclick="showSection('tasks')" class="glass border border-zinc-800 rounded-3xl p-5 cursor-pointer hover:border-zinc-600 transition-colors">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-check-circle text-indigo-400 text-xl"></i>
                        <div>
                            <div class="font-medium">Tasks</div>
                            <div class="text-xs text-zinc-400"><span id="quick-task-count">0</span> active</div>
                        </div>
                    </div>
                </div>
                <div onclick="showSection('money')" class="glass border border-zinc-800 rounded-3xl p-5 cursor-pointer hover:border-zinc-600 transition-colors">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-dollar-sign text-emerald-400 text-xl"></i>
                        <div>
                            <div class="font-medium">Money Moves</div>
                            <div class="text-xs text-zinc-400"><span id="quick-money-count">0</span> logged</div>
                        </div>
                    </div>
                </div>
                <div onclick="showSection('reminders')" class="glass border border-zinc-800 rounded-3xl p-5 cursor-pointer hover:border-zinc-600 transition-colors">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-bell text-violet-400 text-xl"></i>
                        <div>
                            <div class="font-medium">Reminders</div>
                            <div class="text-xs text-zinc-400"><span id="quick-reminder-count">0</span> upcoming</div>
                        </div>
                    </div>
                </div>
                <div onclick="showSection('spark')" class="glass border border-zinc-800 rounded-3xl p-5 cursor-pointer hover:border-zinc-600 transition-colors">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-lightbulb text-amber-400 text-xl"></i>
                        <div>
                            <div class="font-medium">Spark</div>
                            <div class="text-xs text-zinc-400">Random knowledge</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TASKS -->
        <div id="tasks" class="section">
            <h2 class="text-3xl font-semibold tracking-tighter mb-4">Tasks</h2>
            <div class="glass border border-zinc-800 rounded-3xl p-2 flex mb-6">
                <input id="todo-input" type="text" placeholder="What needs to be done?" class="flex-1 bg-transparent px-5 py-3 text-sm focus:outline-none" onkeypress="if(event.key === 'Enter') addTodo()">
                <button onclick="addTodo()" class="px-6 bg-indigo-600 hover:bg-indigo-500 rounded-3xl text-sm font-medium">Add</button>
            </div>
            <div id="todo-list" class="space-y-2"></div>
        </div>

        <!-- MONEY MOVES -->
        <div id="money" class="section">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-3xl font-semibold tracking-tighter">Money Moves</h2>
                <div class="text-xs px-3 py-1 bg-emerald-400/10 text-emerald-400 rounded-full"><span id="money-count">0</span> ideas</div>
            </div>
            
            <div class="glass border border-zinc-800 rounded-3xl p-2 mb-6">
                <div class="flex gap-2">
                    <input id="money-input" type="text" placeholder="Business idea or revenue opportunity..." class="flex-1 bg-transparent px-5 py-3 text-sm focus:outline-none" onkeypress="if(event.key === 'Enter') addMoneyMove()">
                    <input id="money-value" type="number" placeholder="$" class="w-24 bg-zinc-900 border border-zinc-700 px-3 text-sm rounded-3xl">
                    <button onclick="addMoneyMove()" class="px-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-sm font-medium">Log</button>
                </div>
            </div>

            <div id="money-list" class="space-y-2"></div>
        </div>

        <!-- REMINDERS -->
        <div id="reminders" class="section">
            <h2 class="text-3xl font-semibold tracking-tighter mb-4">Reminders</h2>
            <div class="glass border border-zinc-800 rounded-3xl p-2 flex mb-6">
                <input id="reminder-input" type="text" placeholder="Don't forget..." class="flex-1 bg-transparent px-5 py-3 text-sm focus:outline-none" onkeypress="if(event.key === 'Enter') addReminder()">
                <input id="reminder-date" type="date" class="bg-zinc-900 border border-zinc-700 px-4 text-sm rounded-3xl mx-2">
                <button onclick="addReminder()" class="px-6 bg-violet-600 hover:bg-violet-500 rounded-3xl text-sm font-medium">Add</button>
            </div>
            <div id="reminder-list" class="space-y-2"></div>
        </div>

        <!-- SPARK -->
        <div id="spark" class="section">
            <h2 class="text-3xl font-semibold tracking-tighter mb-4">Spark</h2>
            <div class="glass border border-zinc-800 rounded-3xl p-8 max-w-2xl">
                <div id="fact-content" class="text-xl min-h-[100px]"></div>
                <button onclick="showRandomFact()" class="mt-6 px-5 py-2 bg-zinc-900 rounded-3xl text-sm">New Fact</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let todos = JSON.parse(localStorage.getItem('cakehub_todos')) || [];
        let reminders = JSON.parse(localStorage.getItem('cakehub_reminders')) || [];
        let moneyMoves = JSON.parse(localStorage.getItem('cakehub_money')) || [];
        let currentMIT = JSON.parse(localStorage.getItem('cakehub_mit')) || null;

        function saveTodos() { localStorage.setItem('cakehub_todos', JSON.stringify(todos)); }
        function saveReminders() { localStorage.setItem('cakehub_reminders', JSON.stringify(reminders)); }
        function saveMoney() { localStorage.setItem('cakehub_money', JSON.stringify(moneyMoves)); }
        function saveMIT(mit) { currentMIT = mit; localStorage.setItem('cakehub_mit', JSON.stringify(mit)); renderMIT(); }

        // ==================== MIT ====================
        function getToday() { return new Date().toISOString().split('T')[0]; }

        function renderMIT() {
            const container = document.getElementById('mit-card');
            if (!container) return;
            const today = getToday();
            const streakEl = document.getElementById('mit-streak-badge');
            const streakText = document.getElementById('mit-streak-text');

            if (!currentMIT || currentMIT.date !== today) {
                if (streakEl) streakEl.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center py-2">
                        <p class="text-zinc-400 mb-4">What is the one thing that would make today a win?</p>
                        <div class="flex gap-2 max-w-md mx-auto">
                            <input id="mit-input" type="text" placeholder="My #1 priority..." class="flex-1 bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl text-sm focus:outline-none">
                            <button onclick="setMIT()" class="px-6 bg-amber-500 hover:bg-amber-400 text-black font-medium rounded-2xl text-sm">Set</button>
                        </div>
                    </div>`;
            } else {
                const done = currentMIT.completed;
                if (streakEl && currentMIT.streak > 0) {
                    streakEl.classList.remove('hidden'); streakEl.classList.add('flex');
                    streakText.textContent = currentMIT.streak + " day streak";
                }
                container.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-x-4 flex-1">
                            <div onclick="toggleMIT()" class="w-7 h-7 rounded-2xl border flex-shrink-0 flex items-center justify-center cursor-pointer ${done ? 'bg-emerald-500 border-emerald-500' : 'border-amber-400'}">
                                ${done ? '<i class="fa-solid fa-check text-white text-sm"></i>' : ''}
                            </div>
                            <div class="${done ? 'line-through opacity-60' : ''} text-lg">${currentMIT.text}</div>
                        </div>
                        <button onclick="clearMIT()" class="text-xs px-3 py-1 text-zinc-400 hover:text-white">Change</button>
                    </div>`;
            }
        }

        function setMIT() {
            const input = document.getElementById('mit-input');
            if (!input || !input.value.trim()) return;
            const newMIT = { date: getToday(), text: input.value.trim(), completed: false, streak: 1 };
            saveMIT(newMIT);
        }
        function toggleMIT() {
            if (!currentMIT) return;
            currentMIT.completed = !currentMIT.completed;
            if (currentMIT.completed) currentMIT.streak = (currentMIT.streak || 0) + 1;
            saveMIT(currentMIT);
        }
        function clearMIT() {
            currentMIT = null;
            localStorage.removeItem('cakehub_mit');
            renderMIT();
        }

        // ==================== MONEY MOVES ====================
        function renderMoneyMoves() {
            const container = document.getElementById('money-list');
            const countEl = document.getElementById('money-count');
            const quickCount = document.getElementById('quick-money-count');
            if (!container) return;
            container.innerHTML = '';

            if (moneyMoves.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-zinc-500 text-sm">No money moves logged yet.</div>`;
                if (countEl) countEl.textContent = '0';
                if (quickCount) quickCount.textContent = '0';
                return;
            }

            moneyMoves.forEach((move, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between glass border border-zinc-800 px-5 py-4 rounded-3xl`;
                const value = move.value ? `<span class="text-emerald-400 font-medium ml-2">+$${move.value}</span>` : '';
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="text-sm">${move.text}${value}</div>
                        <div class="text-xs text-zinc-500">${new Date(move.date).toLocaleDateString()}</div>
                    </div>
                    <button onclick="deleteMoneyMove(${index}); event.stopImmediatePropagation()" class="text-zinc-400 hover:text-rose-400 w-8 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-times text-sm"></i>
                    </button>
                `;
                container.appendChild(div);
            });

            if (countEl) countEl.textContent = moneyMoves.length;
            if (quickCount) quickCount.textContent = moneyMoves.length;
        }

        function addMoneyMove() {
            const input = document.getElementById('money-input');
            const valueInput = document.getElementById('money-value');
            if (!input || !input.value.trim()) return;

            const move = {
                text: input.value.trim(),
                value: valueInput.value ? parseInt(valueInput.value) : null,
                date: new Date().toISOString()
            };
            moneyMoves.unshift(move);
            input.value = '';
            valueInput.value = '';
            saveMoney();
            renderMoneyMoves();
        }

        function deleteMoneyMove(index) {
            moneyMoves.splice(index, 1);
            saveMoney();
            renderMoneyMoves();
        }

        // ==================== TODOS ====================
        function renderTodos() {
            const container = document.getElementById('todo-list');
            const quick = document.getElementById('quick-task-count');
            if (!container) return;
            container.innerHTML = '';

            if (todos.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-zinc-500 text-sm">No tasks yet.</div>`;
                if (quick) quick.textContent = '0';
                return;
            }

            todos.forEach((todo, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-x-3 glass border border-zinc-800 px-5 py-4 rounded-3xl ${todo.completed ? 'opacity-60' : ''}`;
                div.innerHTML = `
                    <div onclick="toggleTodo(${index})" class="w-5 h-5 flex-shrink-0 rounded-xl border ${todo.completed ? 'bg-indigo-600 border-indigo-600' : 'border-zinc-600'} flex items-center justify-center cursor-pointer">
                        ${todo.completed ? '<i class="fa-solid fa-check text-white text-xs"></i>' : ''}
                    </div>
                    <div class="flex-1 ${todo.completed ? 'line-through opacity-60' : ''}">${todo.text}</div>
                    <button onclick="deleteTodo(${index}); event.stopImmediatePropagation()" class="text-zinc-400 hover:text-rose-400 w-8 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            if (quick) quick.textContent = todos.filter(t => !t.completed).length;
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if (!input || !input.value.trim()) return;
            todos.unshift({ text: input.value.trim(), completed: false });
            input.value = '';
            saveTodos();
            renderTodos();
        }
        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }
        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
            renderTodos();
        }

        // ==================== REMINDERS ====================
        function renderReminders() {
            const container = document.getElementById('reminder-list');
            const quick = document.getElementById('quick-reminder-count');
            if (!container) return;
            container.innerHTML = '';

            if (reminders.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-zinc-500 text-sm">No reminders.</div>`;
                if (quick) quick.textContent = '0';
                return;
            }

            reminders.forEach((reminder, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-x-4 glass border border-zinc-800 px-5 py-4 rounded-3xl`;
                const dateStr = new Date(reminder.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                div.innerHTML = `
                    <div class="text-center w-12 flex-shrink-0 text-xs text-zinc-400">${dateStr}</div>
                    <div class="flex-1">${reminder.text}</div>
                    <button onclick="deleteReminder(${index}); event.stopImmediatePropagation()" class="text-zinc-400 hover:text-rose-400 w-8 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-times text-sm"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            if (quick) quick.textContent = reminders.length;
        }

        function addReminder() {
            const input = document.getElementById('reminder-input');
            const dateInput = document.getElementById('reminder-date');
            if (!input || !input.value.trim()) return;
            const date = dateInput.value || new Date().toISOString().split('T')[0];
            reminders.unshift({ text: input.value.trim(), date: date });
            input.value = '';
            dateInput.value = '';
            saveReminders();
            renderReminders();
        }
        function deleteReminder(index) {
            reminders.splice(index, 1);
            saveReminders();
            renderReminders();
        }

        // ==================== SPARK ====================
        const facts = [
            { text: "The human brain generates enough electricity to power a small light bulb.", category: "Neuroscience" },
            { text: "Octopuses have three hearts and blue blood.", category: "Biology" },
            { text: "A single teaspoon of honey represents the lifetime work of 12 bees.", category: "Nature" }
        ];
        function showRandomFact() {
            const random = facts[Math.floor(Math.random() * facts.length)];
            document.getElementById('fact-content').innerHTML = random.text;
        }

        // ==================== HELPERS ====================
        function updateDate() {
            const dateEl = document.getElementById('current-date');
            const now = new Date();
            dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('[id^="nav-"]').forEach(n => n.classList.remove('nav-active', 'bg-indigo-600'));
            document.getElementById(section).classList.add('active');
            const nav = document.getElementById('nav-' + section);
            if (nav) nav.classList.add('nav-active', 'bg-indigo-600');
        }

        // ==================== INIT ====================
        function initializeApp() {
            updateDate();
            renderMIT();
            renderTodos();
            renderReminders();
            renderMoneyMoves();

            document.getElementById('dashboard').classList.add('active');
            document.getElementById('nav-dashboard').classList.add('nav-active', 'bg-indigo-600');

            if (!currentMIT) {
                const defaultMIT = { date: getToday(), text: "Set your #1 priority for today", completed: false, streak: 0 };
                saveMIT(defaultMIT);
            }
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
